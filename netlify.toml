[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "camera=(), microphone=(), geolocation=()"
    X-XSS-Protection = "1; mode=block"
    Strict-Transport-Security = "max-age=31536000; includeSubDomains; preload"
    Content-Security-Policy = "default-src 'self'; style-src 'self' https://fonts.googleapis.com 'unsafe-inline'; font-src 'self' https://fonts.gstatic.com; img-src 'self' data:; script-src 'self' 'unsafe-inline';"

[[redirects]]
  from = "http://epargnia.fr/*"
  to = "https://epargnia.fr/:splat"
  status = "301"
  force = true

[[redirects]]
  from = "http://www.epargnia.fr/*"
  to = "https://epargnia.fr/:splat"
  status = "301"
  force = true