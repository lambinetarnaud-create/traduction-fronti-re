<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover"/>
  <meta name="apple-mobile-web-app-capable" content="yes"/>
  <meta name="apple-mobile-web-app-status-bar-style" content="default"/>
  <meta name="theme-color" content="#1C2B4A"/>
  <!-- Force light mode — prevent OS dark mode from overriding -->
  <meta name="color-scheme" content="light only"/>
  <title>Traduction Contrôle Frontière</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;700&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="style.css"/>
</head>
<body>

<div id="app">

  <!-- ══════════════════════════════
       TOP BAR (shared by both screens)
  ══════════════════════════════════ -->
  <header class="topbar" id="topbar">

    <!-- Home state -->
    <div class="topbar-state" id="topbar-home">
      <div class="topbar-logo" aria-hidden="true">🛂</div>
      <div class="topbar-title">
        <span class="topbar-main">Contrôle Frontière</span>
        <span class="topbar-sub">Guide de traduction</span>
      </div>
    </div>

    <!-- Phrase state (hidden until a language is selected) -->
    <div class="topbar-state hidden" id="topbar-phrases">
      <button class="topbar-back" id="btn-back" aria-label="Retour">←</button>
      <div class="topbar-title">
        <span class="topbar-main" id="topbar-lang-name">—</span>
        <span class="topbar-sub"  id="topbar-lang-native">—</span>
      </div>
      <span class="topbar-flag" id="topbar-lang-flag" aria-hidden="true"></span>
    </div>

  </header>

  <!-- ══════════════════════════════
       SCREEN 1 — LANGUAGE SELECTION
  ══════════════════════════════════ -->
  <main id="screen-home" class="screen active">

    <!-- Hero banner -->
    <section class="hero" aria-label="Introduction">
      <h1>Traduction pour le<br/><span class="accent">contrôle aux frontières</span></h1>
      <p>Sélectionnez la langue du voyageur pour afficher et lire les phrases clés.</p>
      <div class="hero-stats" aria-label="Statistiques">
        <div class="stat"><span class="stat-n">20</span><span class="stat-l">Langues</span></div>
        <div class="stat"><span class="stat-n">5</span> <span class="stat-l">Catégories</span></div>
        <div class="stat"><span class="stat-n">100+</span><span class="stat-l">Phrases</span></div>
      </div>
    </section>

    <!-- Wave separator -->
    <svg class="wave" viewBox="0 0 390 26" xmlns="http://www.w3.org/2000/svg"
         preserveAspectRatio="none" aria-hidden="true">
      <path d="M0,26 C130,0 260,0 390,26 L390,26 L0,26 Z" fill="#F7F4EE"/>
    </svg>

    <!-- Search -->
    <div class="search-wrap">
      <div class="search-box">
        <span class="search-icon" aria-hidden="true">🔍</span>
        <input
          type="search"
          id="search-input"
          placeholder="Rechercher une langue…"
          autocomplete="off"
          autocorrect="off"
          spellcheck="false"
          aria-label="Rechercher une langue"
        />
        <button class="search-clear hidden" id="search-clear" aria-label="Effacer la recherche">✕</button>
      </div>
    </div>

    <!-- Region filters -->
    <nav class="filter-bar" id="filter-bar" aria-label="Filtres par région"></nav>

    <!-- Language grid -->
    <div class="lang-grid" id="lang-grid" role="list" aria-label="Liste des langues"></div>

  </main>

  <!-- ══════════════════════════════
       SCREEN 2 — PHRASE VIEWER
  ══════════════════════════════════ -->
  <section id="screen-phrases" class="screen hidden">

    <!-- Category tabs -->
    <nav class="cat-tabs" id="cat-tabs" aria-label="Catégories"></nav>

    <!-- Phrase cards list -->
    <div class="phrase-list" id="phrase-list" aria-live="polite" aria-label="Phrases traduite"></div>

  </section>

</div><!-- /#app -->

<script src="app.js"></script>
</body>
</html>
