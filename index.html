<html lang="fr">

<title>Traduction Contrôle Frontière</title>

<style>
/* ═══════════════════════════════════════════════════════════
   style.css — Traduction Contrôle Frontière
   Mobile-first · Forced light mode
═══════════════════════════════════════════════════════════ */

/* ── 0. FORCE LIGHT MODE ── */
:root { color-scheme: light only; }
@media (prefers-color-scheme: dark) { :root { color-scheme: light; } }

/* ── 1. TOKENS ── */
:root {
  --navy:       #1C2B4A;
  --navy-2:     #253660;
  --navy-3:     #3a5a8a;
  --gold:       #C5973A;
  --gold-l:     #E8C97A;
  --sage:       #7A9E8E;
  --sage-l:     #B2CFC5;
  --cream:      #F7F4EE;
  --white:      #FFFFFF;
  --border:     rgba(28,43,74,.10);
  --border-2:   rgba(28,43,74,.06);
  --text:       #1E2235;
  --muted:      #7A7D90;
  --sh-sm:      0 2px 8px  rgba(28,43,74,.07);
  --sh-md:      0 4px 20px rgba(28,43,74,.10);
  --r-sm:  8px;
  --r-md:  12px;
  --r-lg:  16px;
  --r-xl:  20px;
  --r-pill:100px;
  --gap:   14px;
  --gap-sm:10px;
  --font-body:   'DM Sans', sans-serif;
  --font-display:'Playfair Display', serif;
  --topbar-h:    52px;
}

/* ── 2. RESET ── */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html, body { height: 100%; background: var(--cream) !important; color: var(--text) !important; }
body { font-family: var(--font-body); font-size: 16px; line-height: 1.5; overflow: hidden; overscroll-behavior: none; }
button { font-family: var(--font-body); cursor: pointer; border: none; background: none; -webkit-tap-highlight-color: transparent; }
input  { font-family: var(--font-body); color: var(--text); background: transparent; border: none; outline: none; }

/* ── 3. APP SHELL ── */
#app { display: flex; flex-direction: column; height: 100vh; height: 100dvh; overflow: hidden; background: var(--cream); }
.hidden { display: none !important; }

/* ── 4. TOPBAR ── */
.topbar {
  flex-shrink: 0;
  background: var(--navy);
  height: calc(var(--topbar-h) + env(safe-area-inset-top));
  padding-top: env(safe-area-inset-top);
  padding-inline: var(--gap);
  display: flex;
  align-items: center;
  box-shadow: 0 2px 16px rgba(0,0,0,.22);
  z-index: 10;
}
.topbar-state { display: flex; align-items: center; gap: 10px; width: 100%; }
.topbar-logo  { width:36px; height:36px; border-radius:var(--r-sm); background:linear-gradient(135deg,var(--gold),var(--gold-l)); display:flex; align-items:center; justify-content:center; font-size:18px; flex-shrink:0; }
.topbar-title { flex:1; display:flex; flex-direction:column; gap:1px; }
.topbar-main  { font-family:var(--font-display); font-size:1rem; font-weight:500; color:#fff; line-height:1.2; }
.topbar-sub   { font-size:.65rem; color:rgba(255,255,255,.45); letter-spacing:.07em; text-transform:uppercase; }
.topbar-back  { width:36px; height:36px; border-radius:var(--r-sm); background:rgba(255,255,255,.12); color:#fff; font-size:18px; display:flex; align-items:center; justify-content:center; flex-shrink:0; transition:background .18s; }
.topbar-back:active { background:rgba(255,255,255,.28); }
.topbar-flag  { font-size:1.75rem; flex-shrink:0; }

/* ── 5. SCREENS ── */
.screen { display: flex; flex-direction: column; flex: 1; overflow: hidden; }
.screen.active { display: flex; }

/* ── 6. HOME ── */
.hero { flex-shrink:0; background:linear-gradient(150deg,var(--navy) 0%,var(--navy-2) 55%,var(--navy-3) 100%); padding:26px var(--gap) 34px; text-align:center; }
.hero h1 { font-family:var(--font-display); font-size:1.45rem; font-weight:700; color:#fff; line-height:1.28; margin-bottom:8px; }
.hero h1 .accent { color:var(--gold-l); }
.hero p { font-size:.82rem; font-weight:300; color:rgba(255,255,255,.52); line-height:1.65; margin-bottom:18px; }
.hero-stats { display:flex; justify-content:center; gap:24px; }
.stat { display:flex; flex-direction:column; align-items:center; gap:2px; }
.stat-n { font-family:var(--font-display); font-size:1.3rem; color:var(--gold-l); line-height:1; }
.stat-l { font-size:.62rem; color:rgba(255,255,255,.38); letter-spacing:.07em; text-transform:uppercase; }

.wave { display:block; flex-shrink:0; width:100%; height:26px; background:linear-gradient(to bottom,var(--navy-3),var(--navy-3)); }

/* Search */
.search-wrap { flex-shrink:0; padding:13px var(--gap) 9px; }
.search-box  { display:flex; align-items:center; gap:8px; background:var(--white); border:1px solid var(--border); border-radius:var(--r-lg); padding:10px 14px; box-shadow:var(--sh-sm); }
.search-box input { flex:1; font-size:.9rem; }
.search-box input::placeholder { color:var(--muted); }
.search-icon  { font-size:1rem; color:var(--muted); flex-shrink:0; }
.search-clear { color:var(--muted); font-size:.9rem; padding:2px 4px; border-radius:4px; }
.search-clear:active { color:var(--navy); }

/* Filter chips */
.filter-bar { flex-shrink:0; display:flex; gap:7px; padding:0 var(--gap) 11px; overflow-x:auto; }
.filter-bar::-webkit-scrollbar { display:none; }
.chip { padding:5px 13px; border-radius:var(--r-pill); font-size:.75rem; border:1px solid var(--border); background:var(--white); color:var(--muted); white-space:nowrap; flex-shrink:0; transition:all .18s; }
.chip.active { background:var(--navy); color:#fff; border-color:var(--navy); }
.chip:active { opacity:.75; }

/* Lang grid */
.lang-grid { display:grid; grid-template-columns:repeat(2,1fr); gap:var(--gap-sm); padding:0 var(--gap) 10px; overflow-y:auto; -webkit-overflow-scrolling:touch; overscroll-behavior-y:contain; flex:1; min-height:0; }
.lang-grid::-webkit-scrollbar { width:3px; }
.lang-grid::-webkit-scrollbar-thumb { background:var(--sage-l); border-radius:2px; }

.lang-card { background:var(--white); border:1px solid var(--border); border-radius:var(--r-lg); padding:13px 11px; display:flex; align-items:center; gap:11px; box-shadow:var(--sh-sm); cursor:pointer; transition:transform .15s,box-shadow .15s; -webkit-tap-highlight-color:transparent; }
.lang-card:active { transform:scale(.96); box-shadow:none; }
.lc-flag   { font-size:1.75rem; line-height:1; flex-shrink:0; }
.lc-info   { flex:1; min-width:0; }
.lc-name   { font-weight:500; font-size:.88rem; color:var(--navy); white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
.lc-native { font-size:.7rem; color:var(--muted); font-weight:300; }
.lc-arrow  { font-size:.9rem; color:var(--gold); flex-shrink:0; }

.empty-state { grid-column:1/-1; text-align:center; padding:40px 0; color:var(--muted); }
.empty-icon  { font-size:2rem; margin-bottom:8px; }

/* Links button (bottom of home) */
.links-btn-wrap { flex-shrink:0; padding:10px var(--gap) calc(14px + env(safe-area-inset-bottom)); }
.links-btn { width:100%; display:flex; align-items:center; justify-content:center; gap:8px; padding:13px; border-radius:var(--r-lg); background:var(--white); border:1px solid var(--border); color:var(--navy); font-size:.9rem; font-weight:500; box-shadow:var(--sh-sm); transition:all .18s; }
.links-btn:active { background:var(--cream); }

/* ── 7. PHRASE SCREEN ── */
.cat-tabs { flex-shrink:0; display:flex; overflow-x:auto; background:var(--navy-2); border-bottom:1px solid rgba(255,255,255,.08); }
.cat-tabs::-webkit-scrollbar { display:none; }
.ctab { flex-shrink:0; padding:11px 14px; font-size:.76rem; color:rgba(255,255,255,.45); border-bottom:2px solid transparent; white-space:nowrap; transition:color .18s,border-color .18s; }
.ctab.active { color:#fff; }
.ctab:active { opacity:.7; }

.phrase-list { flex:1; overflow-y:auto; -webkit-overflow-scrolling:touch; overscroll-behavior-y:contain; padding:12px var(--gap) 24px; display:flex; flex-direction:column; gap:11px; }
.phrase-list::-webkit-scrollbar { width:3px; }
.phrase-list::-webkit-scrollbar-thumb { background:var(--sage-l); border-radius:2px; }

/* Phrase card */
.pcard { background:var(--white); border:1px solid var(--border); border-radius:var(--r-xl); overflow:visible; box-shadow:var(--sh-sm); }
.pcard-fr { display:flex; align-items:flex-start; gap:7px; padding:10px 14px 8px; border-bottom:1px dashed var(--border-2); }
.pcard-fr-flag { font-size:.95rem; flex-shrink:0; margin-top:1px; }
.pcard-fr-text { font-size:.78rem; color:var(--muted); font-style:italic; line-height:1.55; flex:1; }
.pcard-tr { padding:11px 14px 8px; }
.pcard-tr-text { font-size:1.05rem; font-weight:500; color:var(--navy); line-height:1.5; }
.pcard-tr-text.rtl { direction:rtl; text-align:right; font-size:1.15rem; }
.pcard-actions { display:flex; gap:8px; padding:0 14px 13px; }

/* Speak button */
.btn-speak { flex:1; display:flex; align-items:center; justify-content:center; gap:7px; padding:11px 0; border-radius:var(--r-md); font-size:.86rem; font-weight:500; color:#fff; background:linear-gradient(135deg,var(--navy),var(--navy-2)); transition:opacity .15s,background .2s; user-select:none; }
.btn-speak:active  { opacity:.82; }
.btn-speak.playing { background:linear-gradient(135deg,#2A6050,#3D8A72); }
.btn-speak .spk-icon { font-size:1rem; display:inline-block; }
.btn-speak.playing .spk-icon { animation:icon-pulse .45s infinite alternate; }
@keyframes icon-pulse { from{transform:scale(1)} to{transform:scale(1.3)} }

/* Copy button */
.btn-copy { width:44px; height:44px; flex-shrink:0; border-radius:var(--r-md); border:1px solid var(--border); background:var(--cream); font-size:1.05rem; display:flex; align-items:center; justify-content:center; transition:background .18s,border-color .18s; }
.btn-copy:active { transform:scale(.9); }
.btn-copy.copied { background:var(--sage); border-color:var(--sage); }

/* Expand button */
.btn-expand { width:44px; height:44px; flex-shrink:0; border-radius:var(--r-md); border:1px solid var(--border); background:var(--cream); font-size:1rem; display:flex; align-items:center; justify-content:center; color:var(--navy); transition:background .18s; }
.btn-expand:active { background:var(--navy); color:#fff; border-color:var(--navy); }

/* ── 8. LINKS & CODES SCREEN ── */

/* Onglets liens/codes */
.info-tabs { flex-shrink:0; display:flex; background:var(--navy-2); border-bottom:1px solid rgba(255,255,255,.08); }
.itab { flex:1; padding:12px 8px; font-size:.82rem; font-family:var(--font-body); color:rgba(255,255,255,.45); border-bottom:2px solid transparent; transition:all .18s; white-space:nowrap; }
.itab.active { color:#fff; border-bottom-color:var(--gold); }
.itab:active { opacity:.7; }
.links-page { flex:1; overflow-y:auto; -webkit-overflow-scrolling:touch; padding:20px var(--gap) 32px; display:flex; flex-direction:column; gap:12px; }
.links-page::-webkit-scrollbar { width:3px; }
.links-page::-webkit-scrollbar-thumb { background:var(--sage-l); border-radius:2px; }

.links-header { padding:0 0 8px; }
.links-header h2 { font-family:var(--font-display); font-size:1.3rem; color:var(--navy); margin-bottom:4px; }
.links-header p  { font-size:.82rem; color:var(--muted); }

.link-card { background:var(--white); border:1px solid var(--border); border-radius:var(--r-lg); padding:16px; display:flex; align-items:center; gap:14px; box-shadow:var(--sh-sm); text-decoration:none; color:inherit; transition:transform .15s,box-shadow .15s; -webkit-tap-highlight-color:transparent; }
.link-card:active { transform:scale(.97); box-shadow:none; }
.link-icon { width:44px; height:44px; border-radius:var(--r-md); background:linear-gradient(135deg,var(--navy),var(--navy-2)); display:flex; align-items:center; justify-content:center; font-size:1.2rem; flex-shrink:0; }
.link-info { flex:1; min-width:0; }
.link-title { font-weight:500; font-size:.95rem; color:var(--navy); }
.link-url   { font-size:.72rem; color:var(--muted); margin-top:2px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
/* Codes visa */
.codes-section-title { font-weight:500; font-size:.82rem; color:var(--muted); letter-spacing:.06em; text-transform:uppercase; padding:4px 0 8px; }
.code-card { background:var(--white); border:1px solid var(--border); border-radius:var(--r-md); padding:12px 14px; display:flex; align-items:flex-start; gap:12px; box-shadow:var(--sh-sm); margin-bottom:8px; }
.code-badge { flex-shrink:0; background:var(--navy); color:#fff; font-size:.78rem; font-weight:700; padding:4px 10px; border-radius:var(--r-sm); white-space:nowrap; letter-spacing:.03em; }
.code-badge.bnl { background:linear-gradient(135deg,#2A5A88,var(--navy)); }
.code-desc { font-size:.82rem; color:var(--text); line-height:1.55; }

/* ── 9. FULLSCREEN OVERLAY ── */
.fs-overlay {
  position: fixed;
  inset: 0;
  z-index: 200;
  background: var(--navy);
  display: flex;
  flex-direction: column;
  padding: env(safe-area-inset-top) 0 env(safe-area-inset-bottom);
}
.fs-overlay.hidden { display: none !important; }

.fs-close {
  position: absolute;
  top: calc(12px + env(safe-area-inset-top));
  right: 16px;
  width: 40px; height: 40px;
  border-radius: 50%;
  background: rgba(255,255,255,.15);
  color: #fff;
  font-size: 18px;
  display: flex; align-items: center; justify-content: center;
  z-index: 1;
  transition: background .18s;
}
.fs-close:active { background: rgba(255,255,255,.3); }

.fs-body {
  flex: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 60px 24px 20px;
  gap: 28px;
  overflow-y: auto;
}

.fs-fr {
  font-size: 1rem;
  font-style: italic;
  color: rgba(255,255,255,.55);
  text-align: center;
  line-height: 1.6;
  max-width: 340px;
}

.fs-tr {
  font-family: var(--font-display);
  font-size: clamp(2rem, 12vw, 4rem);
  font-weight: 700;
  color: #fff;
  text-align: center;
  line-height: 1.25;
  width: 100%;
  padding: 0 16px;
  word-break: break-word;
  transition: font-size 0.2s ease;
}
.fs-tr.rtl { direction: rtl; }

.fs-actions {
  flex-shrink: 0;
  padding: 0 24px 20px;
}

.fs-speak {
  width: 100%;
  display: flex; align-items: center; justify-content: center; gap: 10px;
  padding: 16px;
  border-radius: var(--r-lg);
  background: rgba(255,255,255,.15);
  color: #fff;
  font-size: 1rem;
  font-weight: 500;
  border: 1px solid rgba(255,255,255,.2);
  transition: background .18s;
}
.fs-speak:active { background: rgba(255,255,255,.25); }
.fs-speak.playing { background: linear-gradient(135deg,#2A6050,#3D8A72); border-color:transparent; }
.fs-speak .spk-icon { font-size:1.1rem; }
.fs-speak.playing .spk-icon { animation: icon-pulse .45s infinite alternate; }

/* ── LOGIN PIN ── */
#login-screen {
  position: fixed;
  inset: 0;
  z-index: 9999;
  background: var(--navy);
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 40px;
  padding: 24px;
  transition: opacity .35s ease;
}
#login-screen.hide {
  opacity: 0;
  pointer-events: none;
}
.login-header { text-align: center; }
.login-logo {
  width: 56px; height: 56px;
  border-radius: var(--r-md);
  background: linear-gradient(135deg, var(--gold), var(--gold-l));
  display: flex; align-items: center; justify-content: center;
  font-size: 26px;
  margin: 0 auto 16px;
}
.login-title {
  font-family: var(--font-display);
  font-size: 1.3rem;
  color: #fff;
  margin-bottom: 4px;
}
.login-sub {
  font-size: .75rem;
  color: rgba(255,255,255,.4);
  letter-spacing: .06em;
  text-transform: uppercase;
}
.pin-dots {
  display: flex;
  gap: 18px;
}
.pin-dot {
  width: 14px; height: 14px;
  border-radius: 50%;
  border: 2px solid rgba(197,151,58,.6);
  background: transparent;
  transition: background .15s, border-color .15s;
}
.pin-dot.filled {
  background: var(--gold);
  border-color: var(--gold);
}
@keyframes pin-shake {
  0%,100% { transform: translateX(0); }
  20%      { transform: translateX(-8px); }
  40%      { transform: translateX(8px); }
  60%      { transform: translateX(-6px); }
  80%      { transform: translateX(6px); }
}
.pin-dots.shake { animation: pin-shake .4s ease; }
.pin-dots.error .pin-dot { border-color: #e05555; background: #e05555; }
.pin-keypad {
  display: grid;
  grid-template-columns: repeat(3, 72px);
  grid-template-rows: repeat(4, 72px);
  gap: 12px;
}
.pin-key {
  width: 72px; height: 72px;
  border-radius: 50%;
  background: rgba(255,255,255,.18);
  color: #fff;
  font-family: var(--font-body);
  font-size: 1.4rem;
  font-weight: 400;
  display: flex; align-items: center; justify-content: center;
  transition: background .15s, transform .1s;
  -webkit-tap-highlight-color: transparent;
  user-select: none;
}
.pin-key:active { background: rgba(197,151,58,.35); transform: scale(.92); }
.pin-key.del { font-size: 1.1rem; background: rgba(255,255,255,.10); }
.pin-key.empty { visibility: hidden; pointer-events: none; }
</style>
</head>
<body>

<!-- ── LOGIN PIN SCREEN ── -->
<div id="login-screen">
  <div class="login-header">
    <div class="login-logo">🛂</div>
    <div class="login-title">Contrôle Frontière</div>
    <div class="login-sub">Entrez votre code PIN</div>
  </div>
  <div class="pin-dots" id="pin-dots">
    <div class="pin-dot" id="pd0"></div>
    <div class="pin-dot" id="pd1"></div>
    <div class="pin-dot" id="pd2"></div>
    <div class="pin-dot" id="pd3"></div>
  </div>
  <div class="pin-keypad">
    <button class="pin-key" data-k="1">1</button>
    <button class="pin-key" data-k="2">2</button>
    <button class="pin-key" data-k="3">3</button>
    <button class="pin-key" data-k="4">4</button>
    <button class="pin-key" data-k="5">5</button>
    <button class="pin-key" data-k="6">6</button>
    <button class="pin-key" data-k="7">7</button>
    <button class="pin-key" data-k="8">8</button>
    <button class="pin-key" data-k="9">9</button>
    <button class="pin-key empty" aria-hidden="true"></button>
    <button class="pin-key" data-k="0">0</button>
    <button class="pin-key del" data-k="del">⌫</button>
  </div>
</div>

<div id="app">
  <header class="topbar">
    <div class="topbar-state" id="topbar-home">
      <div class="topbar-logo">🛂</div>
      <div class="topbar-title">
        <span class="topbar-main">Contrôle Frontière</span>
        <span class="topbar-sub">Guide de traduction</span>
      </div>
    </div>
    <div class="topbar-state hidden" id="topbar-phrases">
      <button class="topbar-back" id="btn-back">←</button>
      <div class="topbar-title">
        <span class="topbar-main" id="topbar-lang-name"></span>
        <span class="topbar-sub" id="topbar-lang-native"></span>
      </div>
      <span class="topbar-flag" id="topbar-lang-flag"></span>
    </div>
    <div class="topbar-state hidden" id="topbar-links">
      <button class="topbar-back" id="btn-back-links">←</button>
      <div class="topbar-title">
        <span class="topbar-main">Liens &amp; Codes</span>
        <span class="topbar-sub">Ressources</span>
      </div>
      <span style="font-size:1.4rem">🔗</span>
    </div>
  </header>

  <main id="screen-home" class="screen active">
    <section class="hero">
      <h1>Traduction pour le<br/><span class="accent">contrôle aux frontières</span></h1>
      <p>Sélectionnez la langue du voyageur pour afficher et lire les phrases clés.</p>
      <div class="hero-stats">
        <div class="stat"><span class="stat-n">20</span><span class="stat-l">Langues</span></div>
        <div class="stat"><span class="stat-n">5</span><span class="stat-l">Catégories</span></div>
        <div class="stat"><span class="stat-n">100+</span><span class="stat-l">Phrases</span></div>
      </div>
    </section>
    <svg class="wave" viewBox="0 0 390 26" xmlns="http://www.w3.org/2000/svg" preserveAspectRatio="none">

/* ─────────────────────────────────────────────────────────
   4. CONSTRUCTION DES LANGUES
   Regroupe les questions par langue et catégorie
───────────────────────────────────────────────────────── */

// Liste ordonnée des LangueID (ordre du CSV Langues)
const LANG_ORDER = ["SQ","DE","EN","AR","BS","ZH","ES","KA","EL","HE","IT","MK","NL","FA","PT","RO","RU","SR","TR","UK"];

// Noms affichés (du CSV Langues)
const LANG_NAMES = {
  SQ:"Albanais", DE:"Allemand", EN:"Anglais", AR:"Arabe", BS:"Bosniaque",
  ZH:"Chinois",  ES:"Espagnol", KA:"Géorgien", EL:"Grec", HE:"Hébreu",
  IT:"Italien",  MK:"Macédonien", NL:"Néerlandais", FA:"Persan (Farsi)",
  PT:"Portugais", RO:"Roumain", RU:"Russe", SR:"Serbe", TR:"Turc", UK:"Ukrainien",
};

// Flags (du CSV Langues)
const LANG_FLAGS = {
  SQ:"🇦🇱", DE:"🇩🇪", EN:"🇬🇧", AR:"🇸🇦", BS:"🇧🇦",
  ZH:"🇨🇳", ES:"🇪🇸", KA:"🇬🇪", EL:"🇬🇷", HE:"🇮🇱",
  IT:"🇮🇹", MK:"🇲🇰", NL:"🇳🇱", FA:"🇮🇷", PT:"🇵🇹",
  RO:"🇷🇴", RU:"🇷🇺", SR:"🇷🇸", TR:"🇹🇷", UK:"🇺🇦",
};

// Construit l'objet LANGUAGES utilisé par l'UI
const LANGUAGES = LANG_ORDER.map(id => {
  const meta = LANG_META[id];
  const qs   = RAW_QUESTIONS.filter(q => q.lang === id);
  // Regroupe par catégorie
  const bycat = {};
  CATEGORIES.forEach(c => { bycat[c.key] = []; });
  qs.forEach(q => {
    const key = CAT_MAP[q.cat];
    if (key && bycat[key]) bycat[key].push({ fr: q.fr.trim(), tr: q.tr.trim(), qid: q.id });
  });
  return {
    id,
    slug:        meta.slug,
    name:        LANG_NAMES[id],
    native:      meta.native,
    flag:        LANG_FLAGS[id],
    region:      meta.region,
    rtl:         meta.rtl,
    audioFolder: meta.audioFolder,
    questions:   bycat,
  };
});

/* ─────────────────────────────────────────────────────────
   7. NAVIGATION
───────────────────────────────────────────────────────── */
function showScreen(name) {
  stopAudio();
  state.screen = name;
  // topbars
  DOM.topbarHome.classList.toggle   ("hidden", name !== "home");
  DOM.topbarPhrases.classList.toggle("hidden", name !== "phrases");
  DOM.topbarLinks.classList.toggle  ("hidden", name !== "links");
  // screens
  DOM.screenHome.classList.toggle   ("active",  name === "home");
  DOM.screenHome.classList.toggle   ("hidden",  name !== "home");
  DOM.screenPhrases.classList.toggle("active",  name === "phrases");
  DOM.screenPhrases.classList.toggle("hidden",  name !== "phrases");
  DOM.screenLinks.classList.toggle  ("active",  name === "links");
  DOM.screenLinks.classList.toggle  ("hidden",  name !== "links");
}

function goHome() { showScreen("home"); state.lang = null; }

function goToPhrases(lang) {
  state.lang = lang;
  state.cat  = "motif";
  DOM.langName.textContent   = lang.name;
  DOM.langNative.textContent = lang.native;
  DOM.langFlag.textContent   = lang.flag;
  showScreen("phrases");
  renderCatTabs();
  renderPhrases();
  DOM.phraseList.scrollTop = 0;
}

function goToLinks() {
  currentInfoTab = "liens";
  showScreen("links");
  // Reset onglets visuels
  document.querySelectorAll(".itab").forEach(t => {
    t.classList.toggle("active", t.dataset.tab === "liens");
  });
  renderLinks();
}

/* ─────────────────────────────────────────────────────────
   8. RENDER — HOME
───────────────────────────────────────────────────────── */
function renderFilters() {
  const regions = [
    ["all","Toutes"],["europe","Europe"],["moyen-orient","Moyen-Orient"],
    ["asie","Asie"],["amerique","Amériques"],
  ];
  DOM.filterBar.innerHTML = regions.map(([k,l]) =>
    `<button class="chip${state.region===k?" active":""}" data-region="${k}">${l}</button>`
  ).join("");
}

function renderGrid() {
  const q = DOM.searchInput.value.trim().toLowerCase();
  const filtered = LANGUAGES.filter(l => {
    const mr = state.region === "all" || l.region === state.region;
    const ms = l.name.toLowerCase().includes(q) || l.native.toLowerCase().includes(q);
    return mr && ms;
  });
  if (!filtered.length) {
    DOM.langGrid.innerHTML = `<div class="empty-state"><div class="empty-icon">🔍</div><p>Aucune langue trouvée</p></div>`;
    return;
  }
  DOM.langGrid.innerHTML = filtered.map(l => `
    <div class="lang-card" role="listitem" data-id="${l.id}">
      <span class="lc-flag">${l.flag}</span>
      <div class="lc-info">
        <div class="lc-name">${l.name}</div>
        <div class="lc-native">${l.native}</div>
      </div>
      <span class="lc-arrow">›</span>
    </div>`).join("");
}

/* ─────────────────────────────────────────────────────────
   9. RENDER — PHRASES
───────────────────────────────────────────────────────── */
function renderCatTabs() {
  DOM.catTabs.innerHTML = CATEGORIES.map(c => `
    <button class="ctab${state.cat===c.key?" active":""}"
      style="${state.cat===c.key?`border-bottom-color:${c.color}`:""}"
      data-cat="${c.key}" data-color="${c.color}">
      ${c.icon} ${c.label}
    </button>`).join("");
}

function renderPhrases() {
  const qs    = state.lang.questions[state.cat] || [];
  const isRtl = state.lang.rtl;
  if (!qs.length) {
    DOM.phraseList.innerHTML = `<div class="empty-state"><p>Aucune phrase dans cette catégorie.</p></div>`;
    return;
  }
  DOM.phraseList.innerHTML = qs.map((q, idx) => `
    <div class="pcard">
      <div class="pcard-fr">
        <span class="pcard-fr-flag">🇧🇪</span>
        <span class="pcard-fr-text">${q.fr}</span>
      </div>
      <div class="pcard-tr">
        <div class="pcard-tr-text${isRtl?" rtl":""}">${q.tr}</div>
      </div>
      <div class="pcard-actions">
        <button class="btn-speak idle" data-idx="${idx}" aria-label="Écouter">
          <span class="spk-icon">🔊</span> Écouter
        </button>

/* ─────────────────────────────────────────────────────────
   11. FULLSCREEN OVERLAY
───────────────────────────────────────────────────────── */
function openFullscreen(idx) {
  const qs = state.lang.questions[state.cat] || [];
  const q  = qs[idx];
  if (!q) return;
  state.fsIdx = idx;
  DOM.fsFr.textContent = q.fr;
  DOM.fsTr.textContent = q.tr;
  DOM.fsTr.className   = "fs-tr" + (state.lang.rtl ? " rtl" : "");

  // Taille adaptative selon la longueur du texte traduit
  const len = q.tr.length;
  let size;
  if      (len <= 6)  size = "clamp(3.5rem, 35vw, 20rem)";
  else if (len <= 12) size = "clamp(3rem,   20vw, 14rem)";
  else if (len <= 20) size = "clamp(2.5rem, 15vw, 12rem)";
  else if (len <= 35) size = "clamp(2rem,   15vw, 10rem)";
  else if (len <= 55) size = "clamp(1.6rem,  13vw, 10rem)";
  else                size = "clamp(1.3rem,  10vw, 10rem)";
  DOM.fsTr.style.fontSize = size;

  DOM.fsSpeak.className = "fs-speak idle";
  DOM.fsSpeak.innerHTML = '<span class="spk-icon">🔊</span> Écouter';
  DOM.fsOverlay.classList.remove("hidden");
  document.body.style.overflow = "hidden";
}

function closeFullscreen() {
  stopAudio();
  DOM.fsOverlay.classList.add("hidden");
  document.body.style.overflow = "";
  state.fsIdx = null;
}

/* ─────────────────────────────────────────────────────────
   12. AUDIO MP3
───────────────────────────────────────────────────────── */
let currentAudio = null;

function audioPath(lang, catKey, idx) {
  // Numérotation continue Q1→Q20 par langue, dans l'ordre du CSV :
  // motif  5 questions → Q1  à Q5
  // duree  6 questions → Q6  à Q11
  // lieux  4 questions → Q12 à Q15
  // argent 3 questions → Q16 à Q18
  // autres 2 questions → Q19 à Q20
  const offsets = { motif:0, duree:5, lieux:11, argent:15, autres:18 };
  const n = (offsets[catKey] !== undefined ? offsets[catKey] : 0) + idx + 1;
  return `Audio/${lang.audioFolder}/Q${n}.mp3`;
}

function stopAudio() {
  if (currentAudio) {
    currentAudio.pause();
    currentAudio.currentTime = 0;
    currentAudio = null;
  }
  state.playingKey = null;
  updateSpeakBtns();
  // aussi mettre à jour le bouton fullscreen
  DOM.fsSpeak.className = "fs-speak idle";
  DOM.fsSpeak.innerHTML = '<span class="spk-icon">🔊</span> Écouter';
}

function playAudio(idx, isFullscreen) {
  const key  = `${state.cat}-${idx}`;
  if (state.playingKey === key) { stopAudio(); return; }
  stopAudio();
  const path = audioPath(state.lang, state.cat, idx);

  // ── DEBUG : affiche le chemin tenté dans la console du navigateur
  console.log("🔊 Tentative audio :", path);

  const audio = new Audio(path);
  currentAudio = audio;
  audio.addEventListener("play", () => {
    state.playingKey = key;
    updateSpeakBtns();
    if (isFullscreen) {
      DOM.fsSpeak.className = "fs-speak playing";
      DOM.fsSpeak.innerHTML = '<span class="spk-icon">⏹</span> Lecture…';
    }
  });
  audio.addEventListener("ended", stopAudio);
  audio.addEventListener("error", e => {
    // Affiche le chemin ET le code d'erreur dans la console
    console.error("❌ Audio introuvable :", path, "| code:", e.target.error?.code, "| message:", e.target.error?.message);
    stopAudio();
    // Affiche brièvement le chemin sur le bouton pour diagnostic
    const btn = document.querySelector(`.btn-speak[data-idx="${idx}"]`);
    if (btn) {
      btn.innerHTML = `<span style="font-size:.65rem;color:#fca">❌ ${path}</span>`;
      setTimeout(() => {
        btn.className = "btn-speak idle";
        btn.innerHTML = '<span class="spk-icon">🔊</span> Écouter';
      }, 4000);
    }
  });
  audio.play().catch(err => {
    console.error("❌ play() rejeté :", err, "| chemin :", path);
    stopAudio();
  });
}

function updateSpeakBtns() {
  document.querySelectorAll(".btn-speak").forEach(btn => {
    const idx = parseInt(btn.dataset.idx, 10);
    const key = `${state.cat}-${idx}`;
    const on  = key === state.playingKey;
    btn.className = "btn-speak " + (on ? "playing" : "idle");
    btn.innerHTML = on
      ? '<span class="spk-icon">⏹</span> Lecture…'
      : '<span class="spk-icon">🔊</span> Écouter';
  });
}

/* ─────────────────────────────────────────────────────────
   13. COPIE
───────────────────────────────────────────────────────── */
function copyText(text, idx) {
  navigator.clipboard && navigator.clipboard.writeText(text).catch(()=>{});
  const btn = $(`cp-${idx}`);
  if (!btn) return;
  btn.textContent = "✓";
  btn.classList.add("copied");
  setTimeout(() => { btn.textContent = "📋"; btn.classList.remove("copied"); }, 1500);
}

/* ─────────────────────────────────────────────────────────
   14. HELPERS
───────────────────────────────────────────────────────── */
function escAttr(s) {
  return String(s)
    .replace(/&/g,"&amp;").replace(/"/g,"&quot;")
    .replace(/'/g,"&#39;").replace(/</g,"&lt;").replace(/>/g,"&gt;");
}

// Onglets catégories (délégué)
on(DOM.catTabs, "click", e => {
  const tab = e.target.closest(".ctab");
  if (!tab) return;
  stopAudio();
  state.cat = tab.dataset.cat;
  renderCatTabs();
  renderPhrases();
  DOM.phraseList.scrollTop = 0;
});

// Phrase list — speak / expand (délégué)
on(DOM.phraseList, "click", e => {
  const speak  = e.target.closest(".btn-speak");
  if (speak)  { playAudio(parseInt(speak.dataset.idx, 10), false); return; }
  const expand = e.target.closest(".btn-expand");
  if (expand) { openFullscreen(parseInt(expand.dataset.idx, 10)); }
});

// Fullscreen
on(DOM.fsClose,   "click", closeFullscreen);
on(DOM.fsOverlay, "click", e => { if (e.target === DOM.fsOverlay) closeFullscreen(); });
on(DOM.fsSpeak,   "click", () => { if (state.fsIdx !== null) playAudio(state.fsIdx, true); });

// Clavier
document.addEventListener("keydown", e => { if (e.key === "Escape") closeFullscreen(); });

// Stop audio si onglet caché
document.addEventListener("visibilitychange", () => { if (document.hidden) stopAudio(); });

/* ─────────────────────────────────────────────────────────
   16. INIT
───────────────────────────────────────────────────────── */
renderFilters();
renderGrid();

/* ─────────────────────────────────────────────────────────
   LOGIN PIN
───────────────────────────────────────────────────────── */
(function() {
  const PIN_CODE = '6041';
  const SESSION_KEY = 'pin_unlocked';

  const screen  = document.getElementById('login-screen');
  const dotsEl  = document.getElementById('pin-dots');
  const dotEls  = [0,1,2,3].map(i => document.getElementById('pd'+i));

  let entered = '';

  if (sessionStorage.getItem(SESSION_KEY) === '1') {
    screen.style.display = 'none';
    return;
  }

  function updateDots() {
    dotEls.forEach((d, i) => d.classList.toggle('filled', i < entered.length));
  }

  function onSuccess() {
    sessionStorage.setItem(SESSION_KEY, '1');
    screen.classList.add('hide');
    screen.addEventListener('transitionend', () => { screen.style.display = 'none'; }, { once: true });
  }

  function onError() {
    dotsEl.classList.add('error', 'shake');
    if (navigator.vibrate) navigator.vibrate([80, 40, 80]);
    setTimeout(() => {
      dotsEl.classList.remove('error', 'shake');
      entered = '';
      updateDots();
    }, 600);
  }

  function pressKey(k) {
    if (k === 'del') { entered = entered.slice(0, -1); updateDots(); return; }
    if (entered.length >= 4) return;
    entered += k;
    updateDots();
    if (entered.length === 4) {
      if (entered === PIN_CODE) { onSuccess(); } else { onError(); }
    }
  }

  document.querySelectorAll('.pin-key[data-k]').forEach(btn => {
    btn.addEventListener('click', () => pressKey(btn.dataset.k));
  });
})();
</script>
